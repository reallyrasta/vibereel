<script>
// ==================== DATA ====================
const MOCK_MOVIES = [];
const TMDB_API_KEY = '__TMDB_API_KEY__';

const TMDB_IMAGE_BASE = 'https://image.tmdb.org/t/p';
const TMDB_GENRE_MAP = {
  28: "Action", 12: "Adventure", 16: "Animation", 35: "Comedy",
  80: "Crime", 99: "Documentary", 18: "Drama", 10751: "Family",
  14: "Fantasy", 36: "History", 27: "Horror", 10402: "Music",
  9648: "Mystery", 10749: "Romance", 878: "Sci-Fi", 10770: "TV Movie",
  53: "Thriller", 10752: "War", 37: "Western"
};

async function fetchMoviesFromTMDB(filters = {}) {
  let url = `https://api.themoviedb.org/3/discover/movie?api_key=__TMDB_API_KEY__&language=en-US&page=1&sort_by=popularity.desc`;
  
  if (filters.yearRange && filters.yearRange.max !== 2026) {
    url += `&primary_release_date.gte=${filters.yearRange.min}-01-01&primary_release_date.lte=${filters.yearRange.max}-12-31`;
  }
  if (filters.runtime && filters.runtime.max < 300) {
    url += `&with_runtime.gte=${filters.runtime.min}&with_runtime.lte=${filters.runtime.max}`;
  }
  
  try {
    const response = await fetch(url);
    const data = await response.json();
    
    if (!data.results) return [];
    
    return data.results.map(movie => ({
      id: movie.id,
      title: movie.title,
      year: parseInt(movie.release_date?.split('-')[0]) || 2024,
      runtime: movie.runtime || 120,
      rating: movie.vote_average,
      votes: movie.vote_count,
      genres: movie.genre_ids.map(id => TMDB_GENRE_MAP[id]).filter(Boolean),
      moods: [],
      platforms: ["Netflix", "Prime"],
      occasions: [],
      categories: [],
      actors: [],
      director: "TBD",
      poster: movie.poster_path ? `${TMDB_IMAGE_BASE}/w300${movie.poster_path}` : '',
      backdrop: movie.backdrop_path ? `${TMDB_IMAGE_BASE}/w1280${movie.backdrop_path}` : '',
      overview: movie.overview || 'No description available.',
      trailer: "",
      is_original: true,
      is_sequel: false,
      sequel_number: 0,
      posterColor: "#1A1A1A",
      posterAccent: "#0A0A14"
    }));
  } catch (error) {
    console.error('TMDB fetch failed:', error);
    return [];
  }
}

async function fetchMovieDetails(tmdbId) {
  const [detailsRes, creditsRes, videosRes] = await Promise.all([
    fetch(`https://api.themoviedb.org/3/movie/${tmdbId}?api_key=__TMDB_API_KEY__`),
    fetch(`https://api.themoviedb.org/3/movie/${tmdbId}/credits?api_key=__TMDB_API_KEY__`),
    fetch(`https://api.themoviedb.org/3/movie/${tmdbId}/videos?api_key=__TMDB_API_KEY__`)
  ]);
  
  const details = await detailsRes.json();
  const credits = await creditsRes.json();
  const videos = await videosRes.json();
  
  const trailer = videos.results?.find(v => v.type === 'Trailer' && v.site === 'YouTube');
  const director = credits.crew?.find(p => p.job === 'Director');
  
  return {
    runtime: details.runtime || 120,
    genres: details.genres?.map(g => g.name) || [],
    director: director?.name || 'Unknown',
    actors: (credits.cast?.slice(0, 5) || []).map(a => ({ id: a.id, name: a.name })),
    trailer: trailer?.key || ''
  };
}

    async init() {
    this.updateAuthUI();

    this.updateWatchlistBadge();
    this.navigate('home');
    
    if (this.state.user) {

    }
    
    const { data: { session } } = await supabase.auth.getSession();
    if (session?.user) {
        this.state.user = {
            id: session.user.id,
            name: session.user.user_metadata?.name || session.user.email.split('@')[0],
            email: session.user.email
        };
        localStorage.setItem('vibereel_user', JSON.stringify(this.state.user));
        this.updateAuthUI();
        await this.loadWatchlist();
    }
    
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') { this.closeModal(); this.closeTrailer(); this.closeAuthModal(); }
    });
    },

    toggleMobileMenu() {
        document.getElementById('mobile-menu').classList.toggle('hidden');
    },

    navigate(page) {
        this.state.page = page;
        document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
        const nav = document.getElementById(`nav-${page}`);
        if (nav) nav.classList.add('active');

        const appEl = document.getElementById('app');
        appEl.style.opacity = '0';
        setTimeout(() => {
            if (page === 'home') appEl.innerHTML = this.renderHome();
            else if (page === 'results') appEl.innerHTML = this.renderResults();
            else if (page === 'curated') appEl.innerHTML = this.renderCurated();
            else if (page === 'watchlist') appEl.innerHTML = this.renderWatchlist();
            else if (page === 'about') appEl.innerHTML = this.renderAbout();
            appEl.style.opacity = '1';
            window.scrollTo(0, 0);
        }, 150);
    },

    // ==================== AUTH SYSTEM ====================
    async handleLogin() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    
    if (error) {
        this.showToast(error.message);
        return;
    }
    
    this.state.user = { 
        id: data.user.id, 
        name: data.user.user_metadata?.name || email.split('@')[0], 
        email: data.user.email 
    };
    localStorage.setItem('vibereel_user', JSON.stringify(this.state.user));
    this.closeAuthModal();
    this.updateAuthUI();
    await this.loadWatchlist();
    this.updateWatchlistBadge();
    this.showToast(`Welcome back, ${this.state.user.name}!`);
    if (this.state.page === 'watchlist') this.navigate('watchlist');
    },

async handleSignup() {
    const name = document.getElementById('signup-name').value;
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;
    
    const { data, error } = await supabase.auth.signUp({
        email, password,
        options: { data: { name } }
    });
    
    if (error) {
        this.showToast(error.message);
        return;
    }
    
    this.state.user = { id: data.user.id, name, email };
    localStorage.setItem('vibereel_user', JSON.stringify(this.state.user));
    this.closeAuthModal();
    this.updateAuthUI();
    await this.loadWatchlist();
    this.updateWatchlistBadge();
    this.showToast(`Account created! Welcome, ${name}!`);
    },

async handleSSO(provider) {
    const { error } = await supabase.auth.signInWithOAuth({
        provider,
        options: { redirectTo: window.location.origin }
    });
    if (error) this.showToast(error.message);
    },

async logout() {
    await supabase.auth.signOut();
    this.state.user = null;
    localStorage.removeItem('vibereel_user');
    this.updateAuthUI();
    this.showToast('Logged out successfully');
    if (this.state.page === 'watchlist') this.navigate('home');
    },

    // ==================== FILTER LOGIC ====================
    setFilter(key, value) {
        this.state.filters[key] = value;
        this.updateFilterUI();
    },

    toggleArrayFilter(key, value) {
        const arr = this.state.filters[key];
        const idx = arr.indexOf(value);
        if (idx > -1) arr.splice(idx, 1);
        else arr.push(value);
        this.updateFilterUI();
    },

    toggleMood(name) {
        const arr = this.state.filters.moods;
        const idx = arr.indexOf(name);
        if (idx > -1) {
            arr.splice(idx, 1);
        } else {
            if (arr.length >= 5) {
                this.showToast('Maximum 5 moods allowed');
                return;
            }
            arr.push(name);
        }
        this.updateMoodUI();
        this.updateMoodCount();
    },

    toggleOccasion(name) {
        const arr = this.state.filters.occasions;
        const idx = arr.indexOf(name);
        if (idx > -1) {
            arr.splice(idx, 1);
        } else {
            if (arr.length >= 3) {
                this.showToast('Maximum 3 occasions allowed');
                return;
            }
            arr.push(name);
        }
        this.updateOccasionUI();
        this.updateOccasionCount();
    },

    setOccasionTab(tab) {
        this.state.occasionTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${tab}`)?.classList.add('active');
        const grid = document.getElementById('occasion-grid');
        if (grid) grid.innerHTML = this.renderOccasionGrid(tab);
        this.updateOccasionUI();
    },

    searchMoods(query) {
        const resultsDiv = document.getElementById('mood-search-results');
        const sectionsDiv = document.getElementById('mood-sections');
        if (!query.trim()) {
            resultsDiv.classList.add('hidden');
            sectionsDiv.classList.remove('hidden');
            return;
        }
        resultsDiv.classList.remove('hidden');
        sectionsDiv.classList.add('hidden');

        const matches = ALL_MOODS.filter(m => m.name.toLowerCase().includes(query.toLowerCase()));
        resultsDiv.innerHTML = matches.map(m => {
            const isSelected = this.state.filters.moods.includes(m.name);
            return `
                <button onclick="app.toggleMood('${m.name}'); document.getElementById('mood-search-input').value=''; app.searchMoods('')" 
                    class="mood-btn py-2.5 px-3 rounded-lg text-sm font-medium flex items-center gap-1.5 ${isSelected ? 'selected' : ''}">
                    <i class="fas fa-check text-xs check-icon"></i>
                    ${m.emoji} ${m.name}
                </button>
            `;
        }).join('') || '<span class="text-sm text-vr-text-muted">No moods found</span>';
    },

    setRuntime(min, max) {
        this.state.filters.runtime = { min, max };
        document.querySelectorAll('.runtime-btn').forEach((btn, i) => {
            const ranges = [{min:0,max:300},{min:0,max:60},{min:60,max:120},{min:120,max:180},{min:180,max:300},{min:0,max:90}];
            btn.classList.toggle('active', ranges[i].min === min && ranges[i].max === max);
        });
    },

    setYearRange(min, max) {
        this.state.filters.yearRange = { min, max };

    renderActiveFilters() {
        const chips = [];
        const f = this.state.filters;
        if (f.type !== 'movie') chips.push({label: 'TV Shows', key: 'type', val: 'tv'});
        f.moods.forEach(m => chips.push({label: m, key: 'moods', val: m}));
        if (f.runtime.max !== 300 || f.runtime.min !== 0) chips.push({label: `${f.runtime.min}-${f.runtime.max}min`, key: 'runtime'});
        f.platforms.forEach(p => chips.push({label: p, key: 'platforms', val: p}));
        f.actors.forEach(aid => { const a = ACTORS.find(x => x.id === aid); if (a) chips.push({label: a.name, key: 'actors', val: aid}); });
        if (f.typePreference !== 'any') chips.push({label: f.typePreference, key: 'typePreference'});
        if (f.sequelPreference !== 'any') chips.push({label: f.sequelPreference, key: 'sequelPreference'});
        f.categories.forEach(c => chips.push({label: c, key: 'categories', val: c}));

        return chips.map(c => `
            <span class="inline-flex items-center gap-1 px-3 py-1 bg-vr-red/10 border border-vr-red/30 rounded-full text-sm text-vr-text-primary chip">
                ${c.label}

    removeFilter(key, val) {
        if (Array.isArray(this.state.filters[key])) {
            const idx = this.state.filters[key].indexOf(val);
            if (idx > -1) this.state.filters[key].splice(idx, 1);
        } else {
            if (key === 'type') this.state.filters.type = 'movie';
            else if (key === 'typePreference') this.state.filters.typePreference = 'any';
            else if (key === 'sequelPreference') this.state.filters.sequelPreference = 'any';
            else if (key === 'runtime') this.state.filters.runtime = { min: 0, max: 300 };
            else if (key === 'yearRange') this.state.filters.yearRange = { min: 1960, max: 2026 };
        }
        this.generateRecommendations();
    },

    async generateRecommendations() {
    const f = this.state.filters;
    
    document.getElementById('app').innerHTML = `
        <div class="flex items-center justify-center min-h-[60vh]">
            <div class="text-center">
                <div class="loader mx-auto mb-4"></div>
                <p class="text-vr-text-secondary">Finding movies for your vibe...</p>
            </div>
        </div>
    `;
    
    try {
        let movies = await fetchMoviesFromTMDB(f);
        
        if (f.moods.length > 0) {
            const moodToGenre = {
                "Action": "Action", "Comedy": "Comedy", "Drama": "Drama",
                "Horror": "Horror", "Romance": "Romance", "Thriller": "Thriller",
                "Adventure": "Adventure", "Sci-Fi": "Science Fiction",
                "Fantasy": "Fantasy", "Mystery": "Mystery", "Crime": "Crime",
                "Documentary": "Documentary"
            };
            const targetGenres = f.moods.map(m => moodToGenre[m]).filter(Boolean);
            if (targetGenres.length > 0) {
                movies = movies.filter(m => m.genres.some(g => targetGenres.includes(g)));
            }
        }
        
        if (movies.length > 0) {
            const enriched = await Promise.all(
                movies.slice(0, 12).map(async m => {
                    try {
                        const details = await fetchMovieDetails(m.id);
                        return { ...m, ...details };
                    } catch (e) {
                        return m;
                    }
                })
            );
            this.state.results = enriched;
        } else {
            this.state.results = movies;
        }
        
        this.navigate('results');
    } catch (error) {
        console.error('Search failed:', error);
        this.showToast('Could not load movies. Please try again.');
        this.state.results = [];
        this.navigate('results');
    }
    },

    async toggleWatchlist(movieId) {
    if (!this.state.user) {
        this.openAuth('login');
        return;
    }
    
    const { data: existing } = await supabase
        .from('watchlist')
        .select('*')
        .eq('movie_id', movieId)
        .eq('user_id', this.state.user.id)
        .single();
    
    if (existing) {
        await supabase.from('watchlist').delete().eq('id', existing.id);
        this.showToast('Removed from watchlist');
    } else {
        await supabase.from('watchlist').insert({
            user_id: this.state.user.id,
            movie_id: movieId
        });
        this.showToast('Added to watchlist');
    }
    
    const { data } = await supabase
        .from('watchlist')
        .select('movie_id')
        .eq('user_id', this.state.user.id);
    
    this.state.watchlist = data?.map(w => w.movie_id) || [];
    localStorage.setItem('vibereel_watchlist', JSON.stringify(this.state.watchlist));
    this.updateWatchlistBadge();
    
    if (this.state.page === 'watchlist') this.navigate('watchlist');
    else if (this.state.page === 'results') this.navigate('results');
    },

async loadWatchlist() {
    if (!this.state.user) return;

        .from('watchlist')

    exportWatchlist() {
        const movies = MOCK_MOVIES.filter(m => this.state.watchlist.includes(m.id));
        const csv = [
            ['Title', 'Year', 'Runtime', 'Rating', 'Genres', 'Platforms'].join(','),
            ...movies.map(m => [
                `"${m.title}"`, m.year, m.runtime, m.rating, `"${m.genres.join(', ')}"`, `"${m.platforms.join(', ')}"`
            ].join(','))
        ].join('\n');

        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'vibereel-watchlist.csv';
        a.click();
        URL.revokeObjectURL(url);
        this.showToast('Watchlist exported!');
    },

                    </div>
                    <div class="relative flex justify-center text-xs">
                        <span class="px-2 bg-vr-bg-card text-vr-text-muted">or continue with</span>
                    </div>
                </div>

                <button onclick="app.handleSSO('google')" class="sso-btn mb-3">
                    <i class="fab fa-google"></i> Google
                </button>

                <p class="text-center text-sm text-vr-text-secondary mt-4">
                    ${isLogin ? "Don't have an account? " : "Already have an account? "}
                    <button onclick="app.openAuth('${isLogin ? 'signup' : 'login'}')" class="text-vr-red hover:text-vr-red-hover font-medium">
                        ${isLogin ? 'Sign Up' : 'Sign In'}
                    </button>
                </p>
            </div>
        `;

        document.getElementById('auth-modal').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    },

    closeAuthModal() {
        document.getElementById('auth-modal').classList.add('hidden');
        document.body.style.overflow = '';
    }
};

// Initialize
document.addEventListener('DOMContentLoaded', () => app.init());
</script>
</body>
</html>
