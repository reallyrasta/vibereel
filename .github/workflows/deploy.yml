name: Deploy VibeReel to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject API secrets
        run: |
          sed -i 's|__TMDB_API_KEY__|${{ secrets.TMDB_API_KEY }}|g' index.html
          sed -i 's|__TMDB_API_KEY__|${{ secrets.TMDB_API_KEY }}|g' admin.html
          sed -i 's|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g' index.html
          sed -i 's|__SUPABASE_URL__|${{ secrets.SUPABASE_URL }}|g' admin.html
          sed -i 's|__SUPABASE_KEY__|${{ secrets.SUPABASE_KEY }}|g' index.html
          sed -i 's|__SUPABASE_KEY__|${{ secrets.SUPABASE_KEY }}|g' admin.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
