        :root {
            --vr-bg-deep: #080808;
            --vr-bg-card: #111111;
            --vr-bg-secondary: #191919;
            --vr-border: #242424;
            --vr-border-elevated: #2A2A2A;
            --vr-red: #C0392B;
            --vr-red-hover: #E74C3C;
            --vr-gold: #F5C518;
            --vr-text-primary: #EFEFEF;
            --vr-text-secondary: #AAAAAA;
            --vr-text-tertiary: #666666;
            --vr-text-muted: #555555;
            --vr-text-ghost: #333333;
            --vr-hover-overlay: rgba(192, 57, 43, 0.15);
            --vr-modal-backdrop: rgba(0, 0, 0, 0.85);
            --vr-red-glow: rgba(192, 57, 43, 0.40);
            --vr-gold-badge-bg: rgba(245, 197, 24, 0.10);
            --vr-gold-badge-border: rgba(245, 197, 24, 0.20);
            --vr-red-chip-bg: rgba(192, 57, 43, 0.12);
            --vr-red-chip-border: rgba(192, 57, 43, 0.30);
        }

        body { 
            font-family: 'DM Sans', sans-serif; 
            background: var(--vr-bg-deep); 
            color: var(--vr-text-primary);
        }

        .font-playfair { font-family: 'Playfair Display', serif; }
        .font-dmsans { font-family: 'DM Sans', sans-serif; }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        .poster-hover { 
            transition: transform 0.3s ease, box-shadow 0.3s ease; 
        }
        .poster-hover:hover { 
            transform: translateY(-6px); 
            box-shadow: 0 24px 48px rgba(0,0,0,0.7); 
        }

        .filter-btn { 
            transition: all 0.2s ease; 
            background: var(--vr-bg-card);
            border: 1px solid var(--vr-border);
            color: var(--vr-text-tertiary);
        }
        .filter-btn:hover {
            border-color: #444;
            color: var(--vr-text-primary);
        }
        .filter-btn.active-gold {
            background: var(--vr-gold-badge-bg) !important;
            border-color: var(--vr-gold) !important;
            color: var(--vr-gold) !important;
        }
        .filter-btn.active-red {
            background: var(--vr-red) !important;
            border-color: var(--vr-red) !important;
            color: #fff !important;
        }

        .mood-btn {
            transition: all 0.2s ease;
            background: var(--vr-bg-card);
            border: 1px solid var(--vr-border);
            color: var(--vr-text-tertiary);
        }
        .mood-btn:hover {
            border-color: #444;
            color: var(--vr-text-primary);
        }
        .mood-btn.selected {
            background: var(--vr-gold-badge-bg);
            border-color: var(--vr-gold);
            color: var(--vr-gold);
        }
        .mood-btn.selected .check-icon {
            opacity: 1;
        }
        .check-icon {
            opacity: 0;
            transition: opacity 0.2s;
        }

        .occasion-btn {
            transition: all 0.2s ease;
            background: var(--vr-bg-card);
            border: 1px solid var(--vr-border);
            color: var(--vr-text-tertiary);
        }
        .occasion-btn:hover {
            border-color: #444;
            color: var(--vr-text-primary);
        }
        .occasion-btn.selected {
            background: var(--vr-gold-badge-bg);
            border-color: var(--vr-gold);
            color: var(--vr-gold);
        }

        .runtime-btn.active {
            background: var(--vr-red-chip-bg);
            border-color: var(--vr-red);
            color: var(--vr-text-primary);
        }
        .year-btn.active {
            background: var(--vr-red-chip-bg);
            border-color: var(--vr-red);
            color: var(--vr-text-primary);
        }
        .type-pref-btn.active {
            background: var(--vr-red);
            border-color: var(--vr-red);
            color: #fff;
        }
        .sequel-btn.active {
            background: var(--vr-red);
            border-color: var(--vr-red);
            color: #fff;
        }

        .platform-btn.selected {
            background: var(--vr-gold-badge-bg);
            border-color: var(--vr-gold);
            color: var(--vr-gold);
        }
        .category-btn.selected {
            background: var(--vr-gold-badge-bg);
            border-color: var(--vr-gold);
            color: var(--vr-gold);
        }

        .shimmer { 
            background: linear-gradient(90deg, #111 25%, #1a1a1a 50%, #111 75%); 
            background-size: 200% 100%; 
            animation: shimmer 1.5s infinite; 
        }
        @keyframes shimmer { 
            0% { background-position: 200% 0; } 
            100% { background-position: -200% 0; } 
        }

        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { 
            from { transform: translateY(100%); } 
            to { transform: translateY(0); } 
        }

        .hero-gradient { 
            background: linear-gradient(to bottom, rgba(8,8,8,0.3) 0%, rgba(8,8,8,1) 100%); 
        }

        .modal-backdrop { 
            backdrop-filter: blur(8px); 
            background: var(--vr-modal-backdrop);
        }

        .trailer-overlay { 
            background: rgba(0,0,0,0.7); 
            opacity: 0; 
            transition: opacity 0.3s; 
        }
        .poster-hover:hover .trailer-overlay { opacity: 1; }

        .chip { transition: all 0.2s; }
        .chip:hover { transform: translateY(-2px); }

        .nav-link { position: relative; color: var(--vr-text-tertiary); }
        .nav-link::after { 
            content: ''; 
            position: absolute; 
            bottom: -4px; 
            left: 0; 
            width: 0; 
            height: 2px; 
            background: var(--vr-red); 
            transition: width 0.3s; 
        }
        .nav-link:hover, .nav-link.active { 
            color: var(--vr-text-primary); 
        }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }

        .search-input:focus { 
            box-shadow: 0 0 0 2px rgba(192, 57, 43, 0.3); 
            border-color: var(--vr-red);
        }

        .page-transition { transition: opacity 0.3s ease; }

        .loader { 
            border: 3px solid rgba(255,255,255,0.1); 
            border-top-color: var(--vr-red); 
            border-radius: 50%; 
            width: 40px; 
            height: 40px; 
            animation: spin 1s linear infinite; 
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .card-shuffle { animation: shuffle 0.6s ease-in-out; }
        @keyframes shuffle { 
            0%, 100% { transform: translateX(0); } 
            25% { transform: translateX(-10px) rotate(-2deg); } 
            75% { transform: translateX(10px) rotate(2deg); } 
        }

        .film-strip {
            height: 3px;
            background: repeating-linear-gradient(90deg, #C0392B 0px, #C0392B 16px, transparent 16px, transparent 24px);
        }

        .divider-gradient {
            height: 1px;
            background: linear-gradient(90deg, transparent, #242424 20%, #242424 80%, transparent);
        }

        .btn-primary {
            background: var(--vr-red);
            color: #fff;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            background: var(--vr-red-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 20px var(--vr-red-glow);
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid var(--vr-border);
            color: var(--vr-text-tertiary);
            transition: all 0.2s;
        }
        .btn-ghost:hover {
            border-color: var(--vr-gold);
            color: var(--vr-gold);
        }

        .tab-btn {
            padding: 8px 16px;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--vr-text-tertiary);
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
            background: none;
        }
        .tab-btn:hover {
            color: var(--vr-text-primary);
        }
        .tab-btn.active {
            color: var(--vr-gold);
            border-bottom-color: var(--vr-gold);
        }

        .occasion-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--vr-gold-badge-bg);
            border: 1px solid var(--vr-gold-badge-border);
            border-radius: 9999px;
            color: var(--vr-gold);
            font-size: 0.875rem;
            font-weight: 500;
        }
        .occasion-tag button:hover {
            color: #fff;
        }

        .auth-input {
            width: 100%;
            padding: 12px 16px;
            background: var(--vr-bg-card);
            border: 1px solid var(--vr-border);
            border-radius: 12px;
            color: var(--vr-text-primary);
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        .auth-input:focus {
            outline: none;
            border-color: var(--vr-red);
            box-shadow: 0 0 0 3px rgba(192, 57, 43, 0.15);
        }
        .auth-input::placeholder {
            color: var(--vr-text-ghost);
        }

        .sso-btn {
            width: 100%;
            padding: 12px;
            background: var(--vr-bg-card);
            border: 1px solid var(--vr-border);
            border-radius: 12px;
            color: var(--vr-text-primary);
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .sso-btn:hover {
            border-color: #444;
            background: var(--vr-bg-secondary);
        }

            background: var(--vr-bg-secondary);
            border: 1px solid var(--vr-border-elevated);
            border-radius: 9999px;
            font-size: 0.75rem;
            color: #888888;

</head>

    handleLogin() {
        const email = document.getElementById('login-email').value;
        const password = document.getElementById('login-password').value;

        // Demo: accept any valid-looking credentials or check stored users
        const storedUsers = JSON.parse(localStorage.getItem('vibereel_users') || '[]');
        const user = storedUsers.find(u => u.email === email);

        if (user && user.password === password) {
            this.state.user = { id: user.id, name: user.name, email: user.email };
            localStorage.setItem('vibereel_user', JSON.stringify(this.state.user));
            this.closeAuthModal();
            this.updateAuthUI();
            this.showToast(`Welcome back, ${user.name}!`);
            if (this.state.page === 'watchlist') this.navigate('watchlist');
        } else if (!user && email.includes('@') && password.length >= 6) {
            // Demo fallback: create on the fly for testing
            const newUser = { id: Date.now(), name: email.split('@')[0], email, password };
            storedUsers.push(newUser);
            localStorage.setItem('vibereel_users', JSON.stringify(storedUsers));
            this.state.user = { id: newUser.id, name: newUser.name, email: newUser.email };
            localStorage.setItem('vibereel_user', JSON.stringify(this.state.user));
            this.closeAuthModal();
            this.updateAuthUI();
            this.showToast(`Welcome, ${newUser.name}!`);
        } else {
            this.showToast('Invalid credentials. Try again.');
        }
    },

    handleSignup() {
        const name = document.getElementById('signup-name').value;
        const email = document.getElementById('signup-email').value;
        const password = document.getElementById('signup-password').value;

        const storedUsers = JSON.parse(localStorage.getItem('vibereel_users') || '[]');
        if (storedUsers.find(u => u.email === email)) {
            this.showToast('Email already registered. Please log in.');
            return;
        }

        const newUser = { id: Date.now(), name, email, password };
        storedUsers.push(newUser);
        localStorage.setItem('vibereel_users', JSON.stringify(storedUsers));

        this.state.user = { id: newUser.id, name, email };
        localStorage.setItem('vibereel_user', JSON.stringify(this.state.user));
        this.closeAuthModal();
        this.updateAuthUI();
        this.showToast(`Account created! Welcome, ${name}!`);
    },

    handleSSO(provider) {
        // Simulate SSO with a mock user
        const mockNames = { google: 'Alex Rivera', github: 'Jordan Chen' };
        const mockEmails = { google: 'alex.rivera@gmail.com', github: 'jordan.chen@github.com' };

        const newUser = { 
            id: Date.now(), 
            name: mockNames[provider], 
            email: mockEmails[provider],
            provider 
        };

        const storedUsers = JSON.parse(localStorage.getItem('vibereel_users') || '[]');
        if (!storedUsers.find(u => u.email === newUser.email)) {
            storedUsers.push(newUser);
            localStorage.setItem('vibereel_users', JSON.stringify(storedUsers));
        }

        this.state.user = { id: newUser.id, name: newUser.name, email: newUser.email };
        localStorage.setItem('vibereel_user', JSON.stringify(this.state.user));
        this.closeAuthModal();
        this.updateAuthUI();
        this.showToast(`Signed in with ${provider.charAt(0).toUpperCase() + provider.slice(1)}!`);
    },

    logout() {
        this.state.user = null;
        localStorage.removeItem('vibereel_user');
        this.updateAuthUI();
        this.showToast('Logged out successfully');
        if (this.state.page === 'watchlist') this.navigate('home');
    },

                    <div class="trailer-overlay absolute inset-0 flex items-center justify-center">

                        </button>

                    ${movie.is_sequel ? `<div class="absolute top-2 left-2 px-2 py-0.5 bg-black/60 rounded text-[10px] font-medium">#${movie.sequel_number}</div>` : ''}
                    <div class="absolute bottom-0 left-0 right-0 poster-scrim p-3 pt-8">

                        <div class="flex gap-1">

            </div>
        </div>`;

    // ==================== FILTER LOGIC ====================
    setFilter(key, value) {
        this.state.filters[key] = value;
        this.updateFilterUI();
    },

    toggleArrayFilter(key, value) {
        const arr = this.state.filters[key];
        const idx = arr.indexOf(value);
        if (idx > -1) arr.splice(idx, 1);
        else arr.push(value);
        this.updateFilterUI();
    },

    toggleMood(name) {
        const arr = this.state.filters.moods;
        const idx = arr.indexOf(name);
        if (idx > -1) {
            arr.splice(idx, 1);
        } else {
            if (arr.length >= 5) {
                this.showToast('Maximum 5 moods allowed');
                return;
            }
            arr.push(name);
        }
        this.updateMoodUI();
        this.updateMoodCount();
    },

    toggleOccasion(name) {
        const arr = this.state.filters.occasions;
        const idx = arr.indexOf(name);
        if (idx > -1) {
            arr.splice(idx, 1);
        } else {
            if (arr.length >= 3) {
                this.showToast('Maximum 3 occasions allowed');
                return;
            }
            arr.push(name);
        }
        this.updateOccasionUI();
        this.updateOccasionCount();
    },

    setOccasionTab(tab) {
        this.state.occasionTab = tab;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        document.getElementById(`tab-${tab}`)?.classList.add('active');
        const grid = document.getElementById('occasion-grid');
        if (grid) grid.innerHTML = this.renderOccasionGrid(tab);
        this.updateOccasionUI();
    },

    searchMoods(query) {
        const resultsDiv = document.getElementById('mood-search-results');
        const sectionsDiv = document.getElementById('mood-sections');
        if (!query.trim()) {
            resultsDiv.classList.add('hidden');
            sectionsDiv.classList.remove('hidden');
            return;
        }
        resultsDiv.classList.remove('hidden');
        sectionsDiv.classList.add('hidden');

        const matches = ALL_MOODS.filter(m => m.name.toLowerCase().includes(query.toLowerCase()));
        resultsDiv.innerHTML = matches.map(m => {
            const isSelected = this.state.filters.moods.includes(m.name);
            return `
                <button onclick="app.toggleMood('${m.name}'); document.getElementById('mood-search-input').value=''; app.searchMoods('')" 
                    class="mood-btn py-2.5 px-3 rounded-lg text-sm font-medium flex items-center gap-1.5 ${isSelected ? 'selected' : ''}">
                    <i class="fas fa-check text-xs check-icon"></i>
                    ${m.emoji} ${m.name}
                </button>
            `;
        }).join('') || '<span class="text-sm text-vr-text-muted">No moods found</span>';
    },

    setRuntime(min, max) {
        this.state.filters.runtime = { min, max };
        document.querySelectorAll('.runtime-btn').forEach((btn, i) => {
            const ranges = [{min:0,max:300},{min:0,max:60},{min:60,max:120},{min:120,max:180},{min:180,max:300},{min:0,max:90}];
            btn.classList.toggle('active', ranges[i].min === min && ranges[i].max === max);
        });
    },

    setYearRange(min, max) {
        this.state.filters.yearRange = { min, max };
        document.querySelectorAll('.year-btn').forEach((btn, i) => {
            const ranges = [{min:1960,max:2026},{min:2020,max:2026},{min:2010,max:2019},{min:2000,max:2009},{min:1990,max:1999},{min:1980,max:1989},{min:1970,max:1979},{min:1900,max:1969}];
            btn.classList.toggle('active', ranges[i].min === min && ranges[i].max === max);
        });
    },

    updateFilterUI() {
        document.getElementById('type-movie')?.classList.toggle('active-red', this.state.filters.type === 'movie');
        document.getElementById('type-tv')?.classList.toggle('active-red', this.state.filters.type === 'tv');

        PLATFORMS.forEach(p => {
            const btn = document.getElementById(`platform-${p.name}`);
            if (btn) {
                const isSelected = this.state.filters.platforms.includes(p.name);
                btn.classList.toggle('selected', isSelected);
                btn.classList.toggle('active-gold', isSelected);
            }
        });
        const anyBtn = document.getElementById('platform-Any');
        if (anyBtn) anyBtn.classList.toggle('active-gold', this.state.filters.platforms.includes('Any'));

        CATEGORIES.forEach(c => {
            const btn = document.getElementById(`category-${c.name}`);
            if (btn) {
                const isSelected = this.state.filters.categories.includes(c.name);
                btn.classList.toggle('selected', isSelected);
                btn.classList.toggle('active-gold', isSelected);
            }
        });

        document.querySelectorAll('.type-pref-btn').forEach(btn => {
            btn.classList.toggle('active', btn.id === `pref-${this.state.filters.typePreference}`);
        });

        document.querySelectorAll('.sequel-btn').forEach(btn => {
            btn.classList.toggle('active', btn.id === `sequel-${this.state.filters.sequelPreference}`);
        });

        const actorContainer = document.getElementById('selected-actors');
        if (actorContainer) {
            actorContainer.innerHTML = this.state.filters.actors.map(aid => {
                const actor = ACTORS.find(a => a.id === aid);
                return actor ? `<span class="inline-flex items-center gap-1 px-3 py-1 bg-vr-red/10 border border-vr-red/30 rounded-full text-sm text-vr-text-primary">
                    ${actor.name} <button onclick="app.toggleArrayFilter('actors', ${aid})" class="hover:text-white ml-1"><i class="fas fa-times text-xs"></i></button>
                </span>` : '';
            }).join('');
        }
    },

    updateMoodUI() {
        ALL_MOODS.forEach(m => {
            const btn = document.getElementById(`mood-${m.name}`);
            if (btn) btn.classList.toggle('selected', this.state.filters.moods.includes(m.name));
        });
    },

    updateMoodCount() {
        const el = document.getElementById('mood-count');
        if (el) el.textContent = `${this.state.filters.moods.length}/5 selected`;
    },

    updateOccasionUI() {
        ALL_OCCASIONS.forEach(o => {
            const btn = document.getElementById(`occasion-${o.name}`);
            if (btn) btn.classList.toggle('selected', this.state.filters.occasions.includes(o.name));
        });
    },

    updateOccasionCount() {
        const el = document.getElementById('occasion-count');
        if (el) el.textContent = `${this.state.filters.occasions.length}/3 selected`;
    },

    searchActors(query) {
        const results = document.getElementById('actor-results');
        if (!query.trim()) { results.innerHTML = ''; return; }
        const matches = ACTORS.filter(a => a.name.toLowerCase().includes(query.toLowerCase()) && !this.state.filters.actors.includes(a.id));
        results.innerHTML = matches.slice(0, 5).map(a => `
            <button onclick="app.toggleArrayFilter('actors', ${a.id}); document.getElementById('actor-search').value=''; app.searchActors('')" 
                class="px-3 py-1.5 bg-vr-bg-card hover:bg-vr-bg-secondary rounded-lg text-sm border border-vr-border transition-colors text-vr-text-secondary">
                ${a.name}
            </button>
        `).join('');
    },

    clearFilters() {
        this.state.filters = {
            type: 'movie', moods: [], runtime: { min: 0, max: 300 },
            platforms: [], occasions: [], yearRange: { min: 1960, max: 2026 },
            actors: [], typePreference: 'any', sequelPreference: 'any', categories: []
        };
        this.updateFilterUI();
        this.updateMoodUI();
        this.updateMoodCount();
        this.updateOccasionUI();
        this.updateOccasionCount();
        this.setRuntime(0, 300);
        this.setYearRange(1960, 2026);
    },

    renderActiveFilters() {
        const chips = [];
        const f = this.state.filters;
        if (f.type !== 'movie') chips.push({label: 'TV Shows', key: 'type', val: 'tv'});
        f.moods.forEach(m => chips.push({label: m, key: 'moods', val: m}));
        if (f.runtime.max !== 300 || f.runtime.min !== 0) chips.push({label: `${f.runtime.min}-${f.runtime.max}min`, key: 'runtime'});
        f.platforms.forEach(p => chips.push({label: p, key: 'platforms', val: p}));
        f.actors.forEach(aid => { const a = ACTORS.find(x => x.id === aid); if (a) chips.push({label: a.name, key: 'actors', val: aid}); });
        if (f.typePreference !== 'any') chips.push({label: f.typePreference, key: 'typePreference'});
        if (f.sequelPreference !== 'any') chips.push({label: f.sequelPreference, key: 'sequelPreference'});
        f.categories.forEach(c => chips.push({label: c, key: 'categories', val: c}));

        return chips.map(c => `
            <span class="inline-flex items-center gap-1 px-3 py-1 bg-vr-red/10 border border-vr-red/30 rounded-full text-sm text-vr-text-primary chip">
                ${c.label}
                <button onclick="app.removeFilter('${c.key}', ${c.val ? (typeof c.val === 'string' ? `'${c.val}'` : c.val) : ''})" class="hover:text-white ml-1">
                    <i class="fas fa-times text-xs"></i>
                </button>
            </span>
        `).join('');
    },

    removeFilter(key, val) {
        if (Array.isArray(this.state.filters[key])) {
            const idx = this.state.filters[key].indexOf(val);
            if (idx > -1) this.state.filters[key].splice(idx, 1);
        } else {
            if (key === 'type') this.state.filters.type = 'movie';
            else if (key === 'typePreference') this.state.filters.typePreference = 'any';
            else if (key === 'sequelPreference') this.state.filters.sequelPreference = 'any';
            else if (key === 'runtime') this.state.filters.runtime = { min: 0, max: 300 };
            else if (key === 'yearRange') this.state.filters.yearRange = { min: 1960, max: 2026 };
        }
        this.generateRecommendations();
    },

    relaxFilters() {
        this.state.filters.moods = [];
        this.state.filters.occasions = [];
        this.state.filters.categories = [];
        this.state.filters.actors = [];
        this.generateRecommendations();
    },

    // ==================== SEARCH ALGORITHM ====================
    generateRecommendations() {
        const f = this.state.filters;
        let results = [...MOCK_MOVIES];

        results = results.filter(m => m.runtime >= f.runtime.min && m.runtime <= f.runtime.max);
        results = results.filter(m => m.year >= f.yearRange.min && m.year <= f.yearRange.max);

        if (f.platforms.length > 0 && !f.platforms.includes('Any')) {
            results = results.filter(m => m.platforms.some(p => f.platforms.includes(p)));
        }

        if (f.moods.length > 0) {
            results = results.filter(m => m.moods.some(mood => f.moods.includes(mood)));
        }

        if (f.occasions.length > 0) {
            results = results.filter(m => m.occasions.some(o => f.occasions.includes(o)));
        }

        if (f.actors.length > 0) {
            results = results.filter(m => m.actors.some(a => f.actors.includes(a.id)));
        }

        if (f.typePreference === 'original') results = results.filter(m => m.is_original && !m.is_sequel);
        else if (f.typePreference === 'remake') results = results.filter(m => !m.is_original);
        else if (f.typePreference === 'both') results = results.filter(m => m.is_original || !m.is_original);

        if (f.sequelPreference === 'first_only') results = results.filter(m => !m.is_sequel);
        else if (f.sequelPreference === 'sequels_only') results = results.filter(m => m.is_sequel);
        else if (f.sequelPreference === 'complete') results = results.filter(m => m.is_sequel);

        if (f.categories.length > 0) {
            results = results.filter(m => m.categories.some(c => f.categories.includes(c)));
        }

        results = results.map(m => {
            let score = m.rating * 0.4 + (Math.log(m.votes) / Math.log(10)) * 0.3;
            if (f.moods.length > 0) {
                const moodMatches = m.moods.filter(mood => f.moods.includes(mood)).length;
                score += moodMatches * 0.3;
            }
            return { ...m, score };
        }).sort((a, b) => b.score - a.score);

        if (results.length < 3 && f.moods.length > 0) {
            let relaxed = [...MOCK_MOVIES];
            relaxed = relaxed.filter(m => m.runtime >= f.runtime.min && m.runtime <= f.runtime.max);
            relaxed = relaxed.filter(m => m.year >= f.yearRange.min && m.year <= f.yearRange.max);
            if (f.platforms.length > 0 && !f.platforms.includes('Any')) {
                relaxed = relaxed.filter(m => m.platforms.some(p => f.platforms.includes(p)));
            }
            relaxed = relaxed.map(m => ({ ...m, score: m.rating * 0.5 + (Math.log(m.votes) / Math.log(10)) * 0.3 }));
            relaxed = relaxed.sort((a, b) => b.score - a.score);
            results = [...new Map([...results, ...relaxed].map(m => [m.id, m])).values()];
        }

        this.state.results = results;
        this.navigate('results');
    },

    // ==================== INTERACTIONS ====================
    showSurprise() {
        const btn = event?.target?.closest('button');
        if (btn) {
            btn.innerHTML = '<div class="loader w-5 h-5 border-2"></div> Picking...';
            btn.disabled = true;
        }

        const appEl = document.getElementById('app');
        appEl.innerHTML = `
            <div class="flex items-center justify-center min-h-[60vh]">
                <div class="text-center">
                    <div class="relative w-48 h-72 mx-auto mb-8">
                        ${[0,1,2,3,4].map(i => `
                            <div class="absolute inset-0 bg-vr-bg-card rounded-xl border border-vr-border shadow-2xl card-shuffle" style="animation-delay:${i*0.1}s; transform: rotate(${(i-2)*3}deg) translateY(${Math.abs(i-2)*5}px)">
                                <div class="w-full h-full flex items-center justify-center">
                                    <i class="fas fa-film text-4xl text-vr-text-ghost"></i>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                    <h2 class="font-playfair text-2xl font-bold mb-2">Finding something special...</h2>
                    <p class="text-vr-text-secondary font-light">Our AI is hand-picking a movie just for you</p>
                </div>
            </div>
        `;

        setTimeout(() => {
            const random = MOCK_MOVIES[Math.floor(Math.random() * MOCK_MOVIES.length)];
            this.openMovieModal(random.id);
            if (btn) {
                btn.innerHTML = '<i class="fas fa-dice mr-2"></i> Surprise Me';
                btn.disabled = false;
            }
        }, 1500);
    },

    openMovieModal(id) {
        const movie = MOCK_MOVIES.find(m => m.id === id);
        if (!movie) return;
        const inWatchlist = this.state.watchlist.includes(id);
        const hours = Math.floor(movie.runtime / 60);
        const mins = movie.runtime % 60;

        document.getElementById('modal-content').innerHTML = `
            <div class="relative">
                <div class="relative h-64 sm:h-80">
                    <div class="absolute inset-0 bg-gradient-to-br" style="background: linear-gradient(135deg, ${movie.posterColor} 0%, ${movie.posterAccent} 100%)"></div>
                    <div class="absolute inset-0 bg-black/40"></div>
                    <button onclick="app.closeModal()" class="absolute top-4 right-4 w-10 h-10 bg-black/50 hover:bg-black/80 rounded-full flex items-center justify-center text-white transition-colors z-10">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="px-6 pb-6 -mt-20 relative">
                    <div class="flex gap-4 mb-4">
                        <img src="${movie.poster}" class="w-32 sm:w-40 rounded-xl shadow-2xl border-2 border-vr-border" alt="${movie.title}" onerror="this.style.display='none'">
                        <div class="flex-1 pt-20 sm:pt-24">
                            <h2 class="font-playfair text-2xl sm:text-3xl font-bold mb-1">${movie.title}</h2>
                            <div class="flex items-center gap-3 text-sm text-vr-text-secondary mb-3 font-light">
                                <span>${movie.year}</span>
                                <span class="text-vr-border">•</span>
                                <span>${hours}h ${mins}m</span>
                                <span class="text-vr-border">•</span>
                                <span>${movie.genres.join(', ')}</span>
                            </div>
                            <div class="flex items-center gap-4">
                                <div class="flex items-center gap-1">
                                    <i class="fas fa-star text-vr-gold"></i>
                                    <span class="font-bold text-lg text-vr-text-primary">${movie.rating}</span>
                                    <span class="text-vr-text-secondary text-sm">/10</span>
                                </div>
                                <button onclick="app.toggleWatchlist(${movie.id})" 
                                    class="px-4 py-2 rounded-lg font-medium text-sm transition-colors ${inWatchlist ? 'bg-vr-red text-white' : 'bg-vr-bg-secondary hover:bg-vr-border text-vr-text-primary'}">
                                    <i class="fas fa-bookmark mr-2"></i>${inWatchlist ? 'Saved' : 'Watchlist'}
                                </button>
                                <button onclick="app.playTrailer('${movie.trailer}')" class="px-4 py-2 bg-vr-bg-secondary hover:bg-vr-border rounded-lg font-medium text-sm transition-colors flex items-center gap-2 text-vr-text-primary">
                                    <i class="fas fa-play text-xs"></i> Trailer
                                </button>
                            </div>
                        </div>
                    </div>

                    <div class="mb-6">
                        <h3 class="font-playfair font-bold text-lg mb-2">Overview</h3>
                        <p class="text-vr-text-secondary leading-relaxed font-light">${movie.overview}</p>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-vr-bg-secondary rounded-lg p-3 border border-vr-border">
                            <h4 class="text-[10px] font-semibold text-vr-text-muted uppercase tracking-wider mb-1">Director</h4>
                            <p class="font-medium text-sm">${movie.director}</p>
                        </div>
                        <div class="bg-vr-bg-secondary rounded-lg p-3 border border-vr-border">
                            <h4 class="text-[10px] font-semibold text-vr-text-muted uppercase tracking-wider mb-1">Cast</h4>
                            <p class="font-medium text-sm">${movie.actors.map(a => a.name).join(', ')}</p>
                        </div>
                    </div>

                    <div class="mb-6">
                        <h4 class="text-[10px] font-semibold text-vr-text-muted uppercase tracking-wider mb-2">Available On</h4>
                        <div class="flex flex-wrap gap-2">
                            ${movie.platforms.map(p => {
                                const plat = PLATFORMS.find(x => x.name === p);
                                return plat ? `
                                    <a href="#" class="inline-flex items-center gap-2 px-3 py-2 bg-vr-bg-secondary hover:bg-vr-border rounded-lg border border-vr-border transition-colors">
                                        <span class="w-5 h-5 rounded flex items-center justify-center text-[10px] font-bold" style="background:${plat.color};color:${plat.name==='Apple TV+'?'#000':'#fff'}">${plat.icon}</span>
                                        <span class="text-sm">${plat.name}</span>
                                    </a>
                                ` : '';
                            }).join('')}
                        </div>
                    </div>

                    <div class="flex flex-wrap gap-2">
                        ${movie.moods.map(m => `<span class="genre-tag">${m}</span>`).join('')}
                        ${movie.occasions.map(o => `<span class="genre-tag">${o}</span>`).join('')}
                        ${movie.categories.map(c => `<span class="px-3 py-1 bg-vr-red/10 border border-vr-red/20 rounded-full text-sm text-vr-red">${c}</span>`).join('')}
                    </div>

                    ${movie.is_sequel ? `
                    <div class="mt-4 p-3 bg-vr-bg-secondary rounded-lg border border-vr-border">
                        <div class="flex items-center gap-2 text-sm">
                            <i class="fas fa-film text-vr-red"></i>
                            <span>Sequel #${movie.sequel_number} in series</span>
                        </div>
                    </div>
                    ` : ''}
                </div>
            </div>
        `;
        document.getElementById('movie-modal').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    },

    closeModal() {
        document.getElementById('movie-modal').classList.add('hidden');
        document.body.style.overflow = '';
    },

    playTrailer(key) {
        document.getElementById('trailer-iframe').src = `https://www.youtube.com/embed/${key}?autoplay=1`;
        document.getElementById('trailer-modal').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    },

    closeTrailer() {
        document.getElementById('trailer-iframe').src = '';
        document.getElementById('trailer-modal').classList.add('hidden');
        document.body.style.overflow = '';
    },

    openCuratedList(id) {
        const list = CURATED_LISTS.find(l => l.id === id);
        if (!list) return;
        const movies = list.movies.map(mid => MOCK_MOVIES.find(m => m.id === mid)).filter(Boolean);

        document.getElementById('modal-content').innerHTML = `
            <div class="p-6">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 rounded-full bg-gradient-to-r ${list.color} flex items-center justify-center text-lg font-bold">${list.avatar}</div>
                        <div>
                            <h2 class="font-playfair text-xl font-bold">${list.title}</h2>
                            <p class="text-sm text-vr-text-secondary">by ${list.curator} • ${list.movieCount} movies</p>
                        </div>
                    </div>
                    <button onclick="app.closeModal()" class="w-10 h-10 bg-vr-bg-secondary hover:bg-vr-border rounded-full flex items-center justify-center transition-colors border border-vr-border">
                        <i class="fas fa-times text-vr-text-secondary"></i>
                    </button>
                </div>
                <p class="text-vr-text-secondary mb-6 font-light">${list.description}</p>
                <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
                    ${movies.map(m => this.renderMovieCard(m, true)).join('')}
                </div>
            </div>
        `;
        document.getElementById('movie-modal').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
    },

    toggleWatchlist(id) {
        const idx = this.state.watchlist.indexOf(id);
        if (idx > -1) {
            this.state.watchlist.splice(idx, 1);
            this.showToast('Removed from watchlist');
        } else {
            this.state.watchlist.push(id);
            this.showToast('Added to watchlist');
        }
        localStorage.setItem('vibereel_watchlist', JSON.stringify(this.state.watchlist));
        this.updateWatchlistBadge();

        if (this.state.page === 'watchlist') this.navigate('watchlist');
        else if (this.state.page === 'results') this.navigate('results');
    },

    updateWatchlistBadge() {
        const badge = document.getElementById('watchlist-badge');
        if (badge) {
            badge.textContent = this.state.watchlist.length;
            badge.classList.toggle('hidden', this.state.watchlist.length === 0);
        }
    },

    exportWatchlist() {
        const movies = MOCK_MOVIES.filter(m => this.state.watchlist.includes(m.id));
        const csv = [
            ['Title', 'Year', 'Runtime', 'Rating', 'Genres', 'Platforms'].join(','),
            ...movies.map(m => [
                `"${m.title}"`, m.year, m.runtime, m.rating, `"${m.genres.join(', ')}"`, `"${m.platforms.join(', ')}"`
            ].join(','))
        ].join('\n');

        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'vibereel-watchlist.csv';
        a.click();
        URL.revokeObjectURL(url);
        this.showToast('Watchlist exported!');
    },

    showToast(msg) {
        const toast = document.getElementById('toast');
        document.getElementById('toast-message').textContent = msg;
        toast.classList.remove('translate-y-20', 'opacity-0');
        setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 2500);
    }
};

// Initialize
document.addEventListener('DOMContentLoaded', () => app.init());
</script>
